<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" width="900" height="1400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#fff"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e67e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a085;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138d75;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f618d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="450" y="35" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Variant 2: Hybrid Excavation Cycle
  </text>
  <text x="450" y="60" font-size="16" text-anchor="middle" fill="#555" font-style="italic">
    Integrated Drill-Charge-Blast-Muck + Mechanical Cutting
  </text>
  <text x="450" y="85" font-size="13" text-anchor="middle" fill="#e67e22" font-weight="bold">
    🔄 CONTINUOUS OPERATION • INTEGRATED PHASES
  </text>
  
  <!-- Step 1: Integrated Drill-Charge-Blast-Muck -->
  <g filter="url(#shadow)">
    <rect x="100" y="120" width="700" height="200" fill="url(#grad1)" stroke="#d35400" stroke-width="3" rx="12"/>
    <circle cx="200" cy="220" r="60" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
    
    <!-- Step number -->
    <circle cx="820" cy="220" r="25" fill="#d35400" stroke="#fff" stroke-width="2"/>
    <text x="820" y="230" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">1</text>
    
    <!-- Integrated equipment icon - showing all 4 operations -->
    <!-- Drill component -->
    <rect x="140" y="190" width="30" height="60" fill="#fff" stroke="#333" stroke-width="2" rx="2"/>
    <circle cx="155" cy="175" r="14" fill="#fff" stroke="#333" stroke-width="2"/>
    <rect x="150" y="195" width="10" height="8" fill="#333"/>
    <text x="155" y="270" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">Drill</text>
    
    <!-- Charge component -->
    <rect x="185" y="205" width="28" height="40" fill="#fff" stroke="#333" stroke-width="2" rx="2"/>
    <circle cx="199" cy="198" r="6" fill="#333"/>
    <rect x="182" y="245" width="34" height="7" fill="#FFA500" stroke="#333" stroke-width="1"/>
    <text x="199" y="270" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">Charge</text>
    
    <!-- Blast component -->
    <circle cx="240" cy="215" r="12" fill="#fff" stroke="#333" stroke-width="2"/>
    <circle cx="240" cy="215" r="7" fill="#e67e22"/>
    <path d="M 250 207 L 265 195" stroke="#fff" stroke-width="2"/>
    <circle cx="260" cy="205" r="3" fill="#FFD700"/>
    <text x="240" y="270" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">Blast</text>
    
    <!-- Muck component -->
    <rect x="275" y="200" width="45" height="38" fill="#fff" stroke="#333" stroke-width="2" rx="2"/>
    <circle cx="290" cy="218" r="8" fill="#333"/>
    <circle cx="310" cy="218" r="8" fill="#333"/>
    <polygon points="285,243 315,243 300,260" fill="#333"/>
    <text x="300" y="270" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">Muck</text>
    
    <!-- Mechanical cutting backup component -->
    <rect x="340" y="205" width="35" height="35" fill="#fff" stroke="#333" stroke-width="2" rx="2"/>
    <line x1="347" y1="212" x2="368" y2="233" stroke="#333" stroke-width="2"/>
    <line x1="368" y1="212" x2="347" y2="233" stroke="#333" stroke-width="2"/>
    <circle cx="357" cy="222" r="8" fill="#e67e22"/>
    <text x="357" y="270" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">Cut</text>
    
    <!-- Details panel -->
    <text x="410" y="155" font-size="24" font-weight="bold" fill="#fff">INTEGRATED CYCLE</text>
    <text x="410" y="185" font-size="13" fill="#fff">Operations: Drilling, Charging, Blasting & Mucking combined in one phase</text>
    <text x="410" y="205" font-size="13" fill="#fff">Mechanical Cutting: Integrated backup for oversize or difficult material</text>
    <text x="410" y="225" font-size="13" fill="#fff">Duration: 2-3 hours continuous | All 4 operations work simultaneously</text>
    <text x="410" y="245" font-size="13" fill="#fff">Benefit: Minimal delays between operations, continuous production flow</text>
    <text x="410" y="265" font-size="13" fill="#fff">Safety: Single evacuation zone for all integrated operations</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 450 320 L 450 380" stroke="#333" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="470" y="360" font-size="11" fill="#333" font-weight="bold">Fragmented Rock Ready</text>
  
  <!-- Step 2: Ventilation -->
  <g filter="url(#shadow)">
    <rect x="100" y="380" width="700" height="160" fill="url(#grad2)" stroke="#138d75" stroke-width="3" rx="12"/>
    <circle cx="200" cy="460" r="55" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
    
    <!-- Step number -->
    <circle cx="820" cy="460" r="25" fill="#138d75" stroke="#fff" stroke-width="2"/>
    <text x="820" y="470" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">2</text>
    
    <!-- Ventilation fan detailed icon -->
    <circle cx="200" cy="450" r="28" fill="#fff" stroke="#333" stroke-width="2"/>
    <circle cx="200" cy="450" r="20" fill="#16a085"/>
    <line x1="185" y1="450" x2="215" y2="450" stroke="#fff" stroke-width="2.5"/>
    <line x1="200" y1="435" x2="200" y2="465" stroke="#fff" stroke-width="2.5"/>
    <!-- Air flow effect -->
    <path d="M 165 470 L 180 490 L 165 500" fill="#fff" opacity="0.4"/>
    <path d="M 165 485 L 180 505 L 165 515" fill="#fff" opacity="0.3"/>
    <path d="M 170 475 L 190 500 L 170 510" fill="#fff" opacity="0.5"/>
    
    <!-- Details panel -->
    <text x="310" y="405" font-size="24" font-weight="bold" fill="#fff">VENTILATION</text>
    <text x="310" y="435" font-size="13" fill="#fff">Equipment: Industrial-grade ventilation fan system</text>
    <text x="310" y="455" font-size="13" fill="#fff">Airflow: 500,000+ CFM, removes blast fumes within 10-15 minutes</text>
    <text x="310" y="475" font-size="13" fill="#fff">Duration: 15-20 minutes | Multiple intake/exhaust points</text>
    <text x="310" y="495" font-size="13" fill="#fff">Safety: Air quality monitored, operators use PPE during ventilation phase</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 450 540 L 450 600" stroke="#333" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="470" y="580" font-size="11" fill="#333" font-weight="bold">Material Transport</text>
  
  <!-- Step 3: Haulage -->
  <g filter="url(#shadow)">
    <rect x="100" y="600" width="700" height="160" fill="url(#grad3)" stroke="#1f618d" stroke-width="3" rx="12"/>
    <circle cx="200" cy="680" r="55" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
    
    <!-- Step number -->
    <circle cx="820" cy="680" r="25" fill="#1f618d" stroke="#fff" stroke-width="2"/>
    <text x="820" y="690" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">3</text>
    
    <!-- Haulage truck detailed icon -->
    <rect x="140" y="645" width="85" height="60" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="165" cy="670" r="13" fill="#333"/>
    <circle cx="210" cy="670" r="13" fill="#333"/>
    <rect x="135" y="700" width="100" height="18" fill="#333" rx="2"/>
    <polygon points="160,640 195,625 225,640" fill="#2980b9"/>
    <!-- Cabin details -->
    <rect x="148" y="652" width="28" height="20" fill="#87CEEB" stroke="#333" stroke-width="1.5" rx="2"/>
    <circle cx="160" cy="665" r="4" fill="#333"/>
    
    <!-- Details panel -->
    <text x="310" y="625" font-size="24" font-weight="bold" fill="#fff">HAULAGE</text>
    <text x="310" y="655" font-size="13" fill="#fff">Equipment: Large capacity diesel/electric haulage truck</text>
    <text x="310" y="675" font-size="13" fill="#fff">Capacity: 25-35 tonnes per load, semi-autonomous routing available</text>
    <text x="310" y="695" font-size="13" fill="#fff">Duration: 30-45 minutes for multiple loads | GPS tracking integrated</text>
    <text x="310" y="715" font-size="13" fill="#fff">Safety: Load monitoring, automated blind spot detection systems</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 450 760 L 450 820" stroke="#333" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="480" y="800" font-size="11" fill="#333" font-weight="bold">Final Support Phase</text>
  
  <!-- Step 4: Support (Shotcrete) -->
  <g filter="url(#shadow)">
    <rect x="100" y="820" width="700" height="160" fill="url(#grad4)" stroke="#2c3e50" stroke-width="3" rx="12"/>
    <circle cx="200" cy="900" r="55" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
    
    <!-- Step number -->
    <circle cx="820" cy="900" r="25" fill="#2c3e50" stroke="#fff" stroke-width="2"/>
    <text x="820" y="910" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">4</text>
    
    <!-- Shotcrete system detailed icon -->
    <rect x="140" y="860" width="85" height="60" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="160" cy="880" r="9" fill="#333"/>
    <circle cx="195" cy="875" r="8" fill="#333"/>
    <path d="M 185 890 L 195 920" stroke="#333" stroke-width="2.5"/>
    <circle cx="198" cy="925" r="6" fill="#666"/>
    <path d="M 170 925 L 176 945 M 190 925 L 196 945 M 210 925 L 216 945" stroke="#34495e" stroke-width="2.5"/>
    <!-- Pump details -->
    <rect x="210" y="865" width="18" height="45" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
    <circle cx="219" cy="880" r="5" fill="#333"/>
    
    <!-- Details panel -->
    <text x="310" y="845" font-size="24" font-weight="bold" fill="#fff">SUPPORT (Shotcrete)</text>
    <text x="310" y="875" font-size="13" fill="#fff">Equipment: Mobile wet shotcrete pump system with spray arm</text>
    <text x="310" y="895" font-size="13" fill="#fff">Application: 80-120mm thick layer, application rate 1-2 m²/min</text>
    <text x="310" y="915" font-size="13" fill="#fff">Duration: 45-60 minutes | Applied after ventilation + haulage complete</text>
    <text x="310" y="935" font-size="13" fill="#fff">Safety: Prevents rock relaxation, improves wall stability long-term</text>
  </g>
  
  <!-- Cycle completion indicator -->
  <path d="M 820 945 L 820 990" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="820" cy="1010" r="20" fill="#16a085" stroke="#fff" stroke-width="2"/>
  <text x="820" y="1018" font-size="20" font-weight="bold" text-anchor="middle" fill="#fff">✓</text>
  
  <!-- Benefits box -->
  <rect x="50" y="1050" width="800" height="70" fill="#fdf2e9" stroke="#e67e22" stroke-width="2" rx="8"/>
  <text x="70" y="1075" font-size="13" font-weight="bold" fill="#d35400">
    🎯 HYBRID ADVANTAGES:
  </text>
  <text x="70" y="1095" font-size="12" fill="#2c3e50">
    ✓ Continuous operation reduces idle time | ✓ Mechanical cutting handles oversize blocks | ✓ Integrated phases cut cycle time by 30%
  </text>
  <text x="70" y="1115" font-size="12" fill="#2c3e50">
    ✓ Flexibility in mining conditions | ✓ Higher overall productivity (200-250 tonnes/day) | ✓ Single integrated excavation strategy
  </text>
  
  <!-- Key metrics box at bottom -->
  <rect x="50" y="1360" width="800" height="30" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="8"/>
  <text x="70" y="1382" font-size="12" fill="#2c3e50" font-weight="bold">
    ⏱️ Total Cycle Time: 3-4 hours | 📊 Productivity: 200-250 tonnes/day | 🎯 Advantage: Continuous, flexible excavation
  </text>
</svg>