<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" width="1400" height="500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <linearGradient id="hybridGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e67e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hybridGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a085;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138d75;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hybridGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f618d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hybridGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="700" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Variant 2: Hybrid Excavation Cycle
  </text>
  <text x="700" y="55" font-size="14" text-anchor="middle" fill="#555" font-style="italic">
    Integrated Drill-Charge-Blast-Muck (Continuous Operation with Mechanical Cutting)
  </text>
  
  <!-- Background -->
  <rect x="20" y="75" width="1360" height="340" fill="#f9f9f9" stroke="#ddd" stroke-width="2" rx="10"/>
  
  <!-- Phase 1: Integrated Drill-Charge-Blast-Muck -->
  <g>
    <rect x="30" y="95" width="320" height="140" fill="url(#hybridGrad1)" stroke="#d35400" stroke-width="2" rx="8"/>
    
    <!-- Drill component -->
    <rect x="50" y="120" width="25" height="50" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
    <circle cx="62" cy="110" r="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <rect x="58" y="125" width="8" height="6" fill="#333"/>
    <text x="62" y="183" font-size="9" text-anchor="middle" fill="#fff">Drill</text>
    
    <!-- Charge component -->
    <rect x="85" y="130" width="22" height="35" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
    <circle cx="96" cy="125" r="5" fill="#333"/>
    <text x="96" y="183" font-size="9" text-anchor="middle" fill="#fff">Charge</text>
    
    <!-- Blast component -->
    <circle cx="130" cy="140" r="10" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <circle cx="130" cy="140" r="6" fill="#e67e22"/>
    <path d="M 138 135 L 148 130" stroke="#fff" stroke-width="1.5"/>
    <text x="130" y="183" font-size="9" text-anchor="middle" fill="#fff">Blast</text>
    
    <!-- Muck component -->
    <rect x="160" y="125" width="32" height="30" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
    <circle cx="170" cy="138" r="5" fill="#333"/>
    <circle cx="182" cy="138" r="5" fill="#333"/>
    <polygon points="165,158 185,158 175,168" fill="#333"/>
    <text x="176" y="183" font-size="9" text-anchor="middle" fill="#fff">Muck</text>
    
    <!-- Mechanical cutting component -->
    <rect x="210" y="130" width="28" height="30" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
    <line x1="215" y1="135" x2="233" y2="155" stroke="#333" stroke-width="1.5"/>
    <line x1="233" y1="135" x2="215" y2="155" stroke="#333" stroke-width="1.5"/>
    <text x="224" y="183" font-size="9" text-anchor="middle" fill="#fff">Cut</text>
    
    <!-- Integrated label -->
    <text x="170" y="215" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">INTEGRATED CYCLE</text>
    <text x="170" y="235" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">Drill-Charge-Blast-Muck-Cut</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 350 165 L 395 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="372" y="160" font-size="9" fill="#666">Continuous</text>
  
  <!-- Phase 2: Ventilation -->
  <g>
    <rect x="395" y="95" width="160" height="140" fill="url(#hybridGrad2)" stroke="#138d75" stroke-width="2" rx="8"/>
    <!-- Ventilation fan icon -->
    <circle cx="475" cy="135" r="20" fill="#fff" stroke="#333" stroke-width="2"/>
    <circle cx="475" cy="135" r="14" fill="#16a085"/>
    <line x1="465" y1="135" x2="485" y2="135" stroke="#fff" stroke-width="2"/>
    <line x1="475" y1="125" x2="475" y2="145" stroke="#fff" stroke-width="2"/>
    <path d="M 450 160 L 475 190 L 500 160" fill="#333" opacity="0.3"/>
    <path d="M 450 175 L 475 195 L 500 175" fill="#333" opacity="0.2"/>
    <text x="475" y="250" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">VENTILATION</text>
    <text x="475" y="270" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">Ventilation Fan</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 555 165 L 600 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="577" y="160" font-size="9" fill="#666">Flow</text>
  
  <!-- Phase 3: Haulage -->
  <g>
    <rect x="600" y="95" width="160" height="140" fill="url(#hybridGrad3)" stroke="#1f618d" stroke-width="2" rx="8"/>
    <!-- Haulage truck icon -->
    <rect x="630" y="120" width="60" height="38" fill="#fff" stroke="#333" stroke-width="2" rx="2"/>
    <circle cx="645" cy="140" r="8" fill="#333"/>
    <circle cx="675" cy="140" r="8" fill="#333"/>
    <rect x="625" y="158" width="70" height="10" fill="#333" rx="2"/>
    <polygon points="635,115 665,110 675,120" fill="#2980b9"/>
    <text x="680" y="250" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">HAULAGE</text>
    <text x="680" y="270" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">Haulage Truck</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 760 165 L 805 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="782" y="160" font-size="9" fill="#666">Flow</text>
  
  <!-- Phase 4: Support -->
  <g>
    <rect x="805" y="95" width="160" height="140" fill="url(#hybridGrad4)" stroke="#2c3e50" stroke-width="2" rx="8"/>
    <!-- Shotcrete icon -->
    <rect x="830" y="120" width="55" height="40" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="845" cy="135" r="6" fill="#333"/>
    <circle cx="870" cy="130" r="5" fill="#333"/>
    <path d="M 860 140 L 865 165" stroke="#333" stroke-width="2"/>
    <circle cx="868" cy="168" r="4" fill="#333"/>
    <path d="M 850 165 L 855 180 M 860 165 L 865 180 M 870 165 L 875 180" stroke="#34495e" stroke-width="2"/>
    <text x="885" y="250" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">SUPPORT</text>
    <text x="885" y="270" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">Shotcrete</text>
  </g>
  
  <!-- Return arrow to integrated cycle -->
  <path d="M 885 240 L 885 280 L 170 280 L 170 240" stroke="#d35400" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5" opacity="0.6"/>
  <text x="527" y="295" font-size="10" fill="#d35400" font-weight="bold" text-anchor="middle">Cycle Repeats</text>
  
  <!-- Key Innovation Box -->
  <rect x="30" y="300" width="1330" height="105" fill="#fdf2e9" stroke="#e67e22" stroke-width="2" rx="8"/>
  <text x="50" y="320" font-size="13" font-weight="bold" fill="#e67e22">🔄 KEY INNOVATIONS:</text>
  <text x="50" y="345" font-size="12" fill="#2c3e50">
    ✓ <tspan font-weight="bold">Integrated Cycle:</tspan> Drilling, charging, blasting, and mucking happen in one continuous operation with mechanical cutting backup
  </text>
  <text x="50" y="368" font-size="12" fill="#2c3e50">
    ✓ <tspan font-weight="bold">Hybrid Approach:</tspan> Combines traditional drill-blast with mechanical cutting to maximize productivity
  </text>
  <text x="50" y="391" font-size="12" fill="#2c3e50">
    ✓ <tspan font-weight="bold">Continuous Production:</tspan> Minimal delay between phases | <tspan font-weight="bold">Flexibility:</tspan> Mechanical cutting handles oversize or difficult material
  </text>
</svg>