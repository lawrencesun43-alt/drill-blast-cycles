<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" width="1400" height="500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="700" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Variant 1: Reduced Re-entry Cycle
  </text>
  <text x="700" y="55" font-size="14" text-anchor="middle" fill="#555" font-style="italic">
    H₂O₂ Suppression + Battery-Electric Equipment (Ventilation Eliminated)
  </text>
  
  <!-- Background -->
  <rect x="20" y="75" width="1360" height="340" fill="#f9f9f9" stroke="#ddd" stroke-width="2" rx="10"/>
  
  <!-- Phase 1: Drilling -->
  <g>
    <rect x="30" y="95" width="160" height="140" fill="url(#grad1)" stroke="#2980b9" stroke-width="2" rx="8"/>
    <!-- Drill rig icon -->
    <rect x="65" y="120" width="30" height="60" fill="#fff" stroke="#333" stroke-width="2" rx="2"/>
    <circle cx="80" cy="110" r="12" fill="#fff" stroke="#333" stroke-width="2"/>
    <rect x="75" y="125" width="10" height="8" fill="#333"/>
    <polygon points="70,185 90,185 85,200" fill="#333"/>
    <text x="110" y="250" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">DRILLING</text>
    <text x="110" y="270" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">Drill Rig</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 190 165 L 235 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="212" y="160" font-size="9" fill="#666">Flow</text>
  
  <!-- Phase 2: Charging -->
  <g>
    <rect x="235" y="95" width="160" height="140" fill="url(#grad2)" stroke="#c0392b" stroke-width="2" rx="8"/>
    <!-- Charging truck icon -->
    <rect x="265" y="125" width="50" height="35" fill="#fff" stroke="#333" stroke-width="2" rx="2"/>
    <circle cx="280" cy="140" r="6" fill="#333"/>
    <circle cx="305" cy="140" r="6" fill="#333"/>
    <rect x="260" y="155" width="60" height="8" fill="#333"/>
    <polygon points="270,120 290,115 295,120" fill="#e74c3c"/>
    <text x="315" y="250" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">CHARGING</text>
    <text x="315" y="270" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">Charging Truck</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 395 165 L 440 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="417" y="160" font-size="9" fill="#666">Flow</text>
  
  <!-- Phase 3: Blasting -->
  <g>
    <rect x="440" y="95" width="160" height="140" fill="url(#grad3)" stroke="#d68910" stroke-width="2" rx="8"/>
    <!-- Blasting system icon -->
    <circle cx="475" cy="125" r="12" fill="#fff" stroke="#333" stroke-width="2"/>
    <circle cx="475" cy="125" r="6" fill="#f39c12"/>
    <circle cx="505" cy="135" r="10" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <circle cx="505" cy="135" r="5" fill="#f39c12"/>
    <path d="M 485 150 L 510 180" stroke="#fff" stroke-width="2"/>
    <path d="M 495 145 L 495 160" stroke="#fff" stroke-width="2"/>
    <rect x="465" y="165" width="50" height="12" fill="#333" rx="2"/>
    <text x="520" y="250" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">BLASTING</text>
    <text x="520" y="270" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">Blasting System</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 600 165 L 645 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="622" y="160" font-size="9" fill="#666">Flow</text>
  
  <!-- Phase 4: Mucking (Battery Electric) -->
  <g>
    <rect x="645" y="95" width="160" height="140" fill="url(#grad4)" stroke="#229954" stroke-width="2" rx="8"/>
    <!-- Electric loader icon -->
    <rect x="675" y="120" width="55" height="40" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="685" cy="140" r="8" fill="#333"/>
    <circle cx="710" cy="140" r="8" fill="#333"/>
    <polygon points="675,125 695,115 715,125" fill="#27ae60"/>
    <path d="M 685 155 L 705 175" stroke="#333" stroke-width="2"/>
    <!-- Battery symbol -->
    <rect x="720" y="125" width="15" height="25" fill="none" stroke="#333" stroke-width="1.5" rx="1"/>
    <rect x="722" y="123" width="11" height="3" fill="#333" rx="1"/>
    <text x="725" y="148" font-size="8" fill="#333" text-anchor="middle">+</text>
    <text x="725" y="168" font-size="8" fill="#333" text-anchor="middle">-</text>
    <text x="725" y="250" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">MUCKING</text>
    <text x="725" y="270" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">Battery Loader</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 805 165 L 850 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="827" y="160" font-size="9" fill="#666">Flow</text>
  
  <!-- Phase 5: Haulage (Battery Electric) -->
  <g>
    <rect x="850" y="95" width="160" height="140" fill="url(#grad5)" stroke="#8e44ad" stroke-width="2" rx="8"/>
    <!-- Electric haulage truck icon -->
    <rect x="875" y="120" width="60" height="38" fill="#fff" stroke="#333" stroke-width="2" rx="2"/>
    <circle cx="890" cy="140" r="8" fill="#333"/>
    <circle cx="920" cy="140" r="8" fill="#333"/>
    <rect x="870" y="158" width="70" height="10" fill="#333" rx="2"/>
    <polygon points="880,115 910,110 920,120" fill="#9b59b6"/>
    <!-- Battery symbol -->
    <rect x="930" y="125" width="15" height="25" fill="none" stroke="#fff" stroke-width="1.5" rx="1"/>
    <rect x="932" y="123" width="11" height="3" fill="#fff" rx="1"/>
    <text x="910" y="250" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">HAULAGE</text>
    <text x="910" y="270" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">Battery Truck</text>
  </g>
  
  <!-- Arrow 5 -->
  <path d="M 1010 165 L 1055 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1032" y="160" font-size="9" fill="#666">Flow</text>
  
  <!-- Phase 6: Support (Shotcrete) -->
  <g>
    <rect x="1055" y="95" width="160" height="140" fill="url(#grad6)" stroke="#2c3e50" stroke-width="2" rx="8"/>
    <!-- Shotcrete icon -->
    <rect x="1080" y="120" width="55" height="40" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="1095" cy="135" r="6" fill="#333"/>
    <circle cx="1120" cy="130" r="5" fill="#333"/>
    <path d="M 1110 140 L 1115 165" stroke="#333" stroke-width="2"/>
    <circle cx="1118" cy="168" r="4" fill="#333"/>
    <path d="M 1100 165 L 1105 180 M 1110 165 L 1115 180 M 1120 165 L 1125 180" stroke="#34495e" stroke-width="2"/>
    <text x="1135" y="250" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">SUPPORT</text>
    <text x="1135" y="270" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">Shotcrete</text>
  </g>
  
  <!-- Key Innovation Box -->
  <rect x="30" y="300" width="1330" height="105" fill="#e8f8f5" stroke="#27ae60" stroke-width="2" rx="8"/>
  <text x="50" y="320" font-size="13" font-weight="bold" fill="#27ae60">🔑 KEY INNOVATIONS:</text>
  <text x="50" y="345" font-size="12" fill="#2c3e50">
    ✓ <tspan font-weight="bold">Ventilation Eliminated:</tspan> Hydrogen peroxide (H₂O₂) suppression technology removes toxic fumes immediately after blasting
  </text>
  <text x="50" y="368" font-size="12" fill="#2c3e50">
    ✓ <tspan font-weight="bold">Battery-Electric Equipment:</tspan> Electric loader and haulage truck eliminate diesel emissions and reduce re-entry time
  </text>
  <text x="50" y="391" font-size="12" fill="#2c3e50">
    ✓ <tspan font-weight="bold">Faster Cycle:</tspan> Reduced cycle time from 4-5 hours to ~2-3 hours | <tspan font-weight="bold">Improved Safety:</tspan> Minimal fume exposure and automated haul routes
  </text>
</svg>