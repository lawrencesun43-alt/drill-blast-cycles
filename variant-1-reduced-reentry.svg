<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" width="900" height="1400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#fff"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="450" y="35" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Variant 1: Reduced Re-entry Cycle
  </text>
  <text x="450" y="60" font-size="16" text-anchor="middle" fill="#555" font-style="italic">
    H₂O₂ Suppression + Battery-Electric Equipment
  </text>
  <text x="450" y="85" font-size="13" text-anchor="middle" fill="#e74c3c" font-weight="bold">
    ⚡ VENTILATION ELIMINATED • FASTER CYCLE TIME
  </text>
  
  <!-- Step 1: Drilling -->
  <g filter="url(#shadow)">
    <rect x="100" y="120" width="700" height="160" fill="url(#grad1)" stroke="#2980b9" stroke-width="3" rx="12"/>
    <circle cx="200" cy="200" r="55" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
    
    <!-- Step number -->
    <circle cx="820" cy="200" r="25" fill="#2980b9" stroke="#fff" stroke-width="2"/>
    <text x="820" y="210" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">1</text>
    
    <!-- Drill rig detailed icon -->
    <rect x="160" y="170" width="35" height="80" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="177" cy="155" r="18" fill="#fff" stroke="#333" stroke-width="2"/>
    <rect x="170" y="175" width="14" height="12" fill="#333" rx="2"/>
    <polygon points="165,255 189,255 185,275" fill="#666"/>
    <rect x="155" y="250" width="44" height="8" fill="#333"/>
    
    <!-- H2O2 indicator -->
    <circle cx="240" cy="180" r="8" fill="#90EE90" stroke="#333" stroke-width="1.5"/>
    <text x="240" y="186" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">H₂O₂</text>
    
    <!-- Details panel -->
    <text x="320" y="155" font-size="24" font-weight="bold" fill="#fff">DRILLING</text>
    <text x="320" y="185" font-size="13" fill="#fff">Equipment: Pneumatic Drill Rig</text>
    <text x="320" y="205" font-size="13" fill="#fff">Holes: 45-50mm diameter, 3.5-4m deep</text>
    <text x="320" y="225" font-size="13" fill="#fff">Duration: 30-45 minutes | H₂O₂ sprayed during drilling</text>
    <text x="320" y="245" font-size="13" fill="#fff">Safety: Dust suppression, operator safety gear required</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 450 280 L 450 330" stroke="#333" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="480" y="310" font-size="11" fill="#333" font-weight="bold">Holes Ready</text>
  
  <!-- Step 2: Charging -->
  <g filter="url(#shadow)">
    <rect x="100" y="330" width="700" height="160" fill="url(#grad2)" stroke="#c0392b" stroke-width="3" rx="12"/>
    <circle cx="200" cy="410" r="55" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
    
    <!-- Step number -->
    <circle cx="820" cy="410" r="25" fill="#c0392b" stroke="#fff" stroke-width="2"/>
    <text x="820" y="420" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">2</text>
    
    <!-- Charging truck detailed icon -->
    <rect x="150" y="375" width="65" height="50" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="170" cy="405" r="10" fill="#333"/>
    <circle cx="200" cy="405" r="10" fill="#333"/>
    <rect x="145" y="420" width="75" height="12" fill="#333"/>
    <polygon points="165,370 190,360 210,370" fill="#e74c3c"/>
    <!-- Explosives indicator -->
    <rect x="225" y="385" width="30" height="40" fill="#FFA500" stroke="#333" stroke-width="2" rx="2"/>
    <text x="240" y="417" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">EXP</text>
    
    <!-- Details panel -->
    <text x="320" y="355" font-size="24" font-weight="bold" fill="#fff">CHARGING</text>
    <text x="320" y="385" font-size="13" fill="#fff">Equipment: Mobile Charging Truck with bulk explosives</text>
    <text x="320" y="405" font-size="13" fill="#fff">Explosives: 25-35 kg ANFO per hole, booster primers</text>
    <text x="320" y="425" font-size="13" fill="#fff">Duration: 45-60 minutes | Certified operator required</text>
    <text x="320" y="445" font-size="13" fill="#fff">Safety: Exclusion zone 500m, detonation circuits checked</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 450 490 L 450 540" stroke="#333" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="470" y="520" font-size="11" fill="#333" font-weight="bold">Ready to Blast</text>
  
  <!-- Step 3: Blasting -->
  <g filter="url(#shadow)">
    <rect x="100" y="540" width="700" height="160" fill="url(#grad3)" stroke="#d68910" stroke-width="3" rx="12"/>
    <circle cx="200" cy="620" r="55" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
    
    <!-- Step number -->
    <circle cx="820" cy="620" r="25" fill="#d68910" stroke="#fff" stroke-width="2"/>
    <text x="820" y="630" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">3</text>
    
    <!-- Blasting system detailed icon -->
    <circle cx="185" cy="600" r="15" fill="#fff" stroke="#333" stroke-width="2"/>
    <circle cx="185" cy="600" r="10" fill="#f39c12"/>
    <circle cx="220" cy="615" r="13" fill="#fff" stroke="#333" stroke-width="2"/>
    <circle cx="220" cy="615" r="8" fill="#f39c12"/>
    <path d="M 200 625 L 240 655" stroke="#fff" stroke-width="3"/>
    <path d="M 210 618 L 210 638" stroke="#fff" stroke-width="3"/>
    <rect x="175" y="655" width="60" height="15" fill="#333" rx="3"/>
    <!-- Blast effect lines -->
    <circle cx="240" cy="595" r="3" fill="#FFD700"/>
    <circle cx="250" cy="605" r="2" fill="#FFD700"/>
    <circle cx="210" cy="580" r="2.5" fill="#FFD700"/>
    
    <!-- Details panel -->
    <text x="320" y="565" font-size="24" font-weight="bold" fill="#fff">BLASTING</text>
    <text x="320" y="595" font-size="13" fill="#fff">Equipment: Electronic detonation system with wireless triggers</text>
    <text x="320" y="615" font-size="13" fill="#fff">Configuration: Delay sequencing (42ms intervals), ~150-200 holes</text>
    <text x="320" y="635" font-size="13" fill="#fff">Duration: 15-20 seconds | H₂O₂ cloud suppresses toxic fumes instantly</text>
    <text x="320" y="655" font-size="13" fill="#fff">Safety: Remote firing station, 1000m exclusion zone enforced</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 450 700 L 450 750" stroke="#333" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="465" y="730" font-size="11" fill="#333" font-weight="bold">Mucking Phase</text>
  
  <!-- Step 4: Mucking (Battery Electric) -->
  <g filter="url(#shadow)">
    <rect x="100" y="750" width="700" height="160" fill="url(#grad4)" stroke="#229954" stroke-width="3" rx="12"/>
    <circle cx="200" cy="830" r="55" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
    
    <!-- Step number -->
    <circle cx="820" cy="830" r="25" fill="#229954" stroke="#fff" stroke-width="2"/>
    <text x="820" y="840" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">4</text>
    
    <!-- Battery electric loader detailed icon -->
    <rect x="150" y="795" width="70" height="55" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="170" cy="820" r="12" fill="#333"/>
    <circle cx="205" cy="820" r="12" fill="#333"/>
    <polygon points="150,800 180,785 210,800" fill="#27ae60"/>
    <path d="M 170 835 L 190 860" stroke="#333" stroke-width="2.5"/>
    <!-- Battery indicator -->
    <rect x="230" y="805" width="22" height="35" fill="none" stroke="#fff" stroke-width="2" rx="2"/>
    <rect x="233" y="802" width="16" height="4" fill="#fff" rx="1"/>
    <circle cx="241" cy="820" r="5" fill="#00ff00" stroke="#333" stroke-width="1"/>
    
    <!-- Details panel -->
    <text x="320" y="775" font-size="24" font-weight="bold" fill="#fff">MUCKING</text>
    <text x="320" y="805" font-size="13" fill="#fff">Equipment: Battery-Electric Loader (100+ kWh capacity)</text>
    <text x="320" y="825" font-size="13" fill="#fff">Capacity: 5-8 m³ per load, operates for 6-8 hours on single charge</text>
    <text x="320" y="845" font-size="13" fill="#fff">Duration: 60-90 minutes (15-20 loads) | Zero diesel emissions</text>
    <text x="320" y="865" font-size="13" fill="#fff">Safety: Quiet operation (no fume exposure), improved air quality for workers</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 450 910 L 450 960" stroke="#333" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="470" y="940" font-size="11" fill="#333" font-weight="bold">Material Transport</text>
  
  <!-- Step 5: Haulage (Battery Electric) -->
  <g filter="url(#shadow)">
    <rect x="100" y="960" width="700" height="160" fill="url(#grad5)" stroke="#8e44ad" stroke-width="3" rx="12"/>
    <circle cx="200" cy="1040" r="55" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
    
    <!-- Step number -->
    <circle cx="820" cy="1040" r="25" fill="#8e44ad" stroke="#fff" stroke-width="2"/>
    <text x="820" y="1050" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">5</text>
    
    <!-- Battery electric haulage truck detailed icon -->
    <rect x="145" y="1000" width="80" height="55" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="165" cy="1025" r="12" fill="#333"/>
    <circle cx="205" cy="1025" r="12" fill="#333"/>
    <rect x="140" y="1050" width="90" height="15" fill="#333" rx="2"/>
    <polygon points="160,995 190,985 220,995" fill="#9b59b6"/>
    <!-- Battery indicator -->
    <rect x="240" y="1010" width="22" height="35" fill="none" stroke="#fff" stroke-width="2" rx="2"/>
    <rect x="243" y="1007" width="16" height="4" fill="#fff" rx="1"/>
    <circle cx="251" cy="1025" r="5" fill="#00ff00" stroke="#333" stroke-width="1"/>
    
    <!-- Details panel -->
    <text x="320" y="985" font-size="24" font-weight="bold" fill="#fff">HAULAGE</text>
    <text x="320" y="1015" font-size="13" fill="#fff">Equipment: Battery-Electric Haulage Truck (200+ kWh capacity)</text>
    <text x="320" y="1035" font-size="13" fill="#fff">Capacity: 20-30 tonnes per trip, range 40+ km on single charge</text>
    <text x="320" y="1055" font-size="13" fill="#fff">Duration: 30-45 minutes | Charging stations throughout site</text>
    <text x="320" y="1075" font-size="13" fill="#fff">Safety: No diesel fumes, reduced noise, automated safety systems</text>
  </g>
  
  <!-- Arrow 5 -->
  <path d="M 450 1120 L 450 1170" stroke="#333" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="480" y="1150" font-size="11" fill="#333" font-weight="bold">Final Support</text>
  
  <!-- Step 6: Support (Shotcrete) -->
  <g filter="url(#shadow)">
    <rect x="100" y="1170" width="700" height="160" fill="url(#grad6)" stroke="#2c3e50" stroke-width="3" rx="12"/>
    <circle cx="200" cy="1250" r="55" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
    
    <!-- Step number -->
    <circle cx="820" cy="1250" r="25" fill="#2c3e50" stroke="#fff" stroke-width="2"/>
    <text x="820" y="1260" font-size="28" font-weight="bold" text-anchor="middle" fill="#fff">6</text>
    
    <!-- Shotcrete system detailed icon -->
    <rect x="150" y="1215" width="75" height="55" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="170" cy="1235" r="8" fill="#333"/>
    <circle cx="200" cy="1228" r="7" fill="#333"/>
    <path d="M 190 1245 L 195 1270" stroke="#333" stroke-width="2.5"/>
    <circle cx="198" cy="1273" r="5" fill="#666"/>
    <path d="M 175 1273 L 180 1290 M 190 1273 L 195 1290 M 205 1273 L 210 1290" stroke="#34495e" stroke-width="2.5"/>
    
    <!-- Details panel -->
    <text x="320" y="1195" font-size="24" font-weight="bold" fill="#fff">SUPPORT (Shotcrete)</text>
    <text x="320" y="1225" font-size="13" fill="#fff">Equipment: Mobile Shotcrete pump with robotic arm</text>
    <text x="320" y="1245" font-size="13" fill="#fff">Application: 100-150mm thick layer, 200+ MPa strength</text>
    <text x="320" y="1265" font-size="13" fill="#fff">Duration: 45-60 minutes | Applied same day as blast</text>
    <text x="320" y="1285" font-size="13" fill="#fff">Safety: Prevents rock relaxation, improves stability, reduces future falls</text>
  </g>
  
  <!-- Cycle completion indicator -->
  <path d="M 820 1275 L 820 1320" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="820" cy="1340" r="20" fill="#27ae60" stroke="#fff" stroke-width="2"/>
  <text x="820" y="1348" font-size="20" font-weight="bold" text-anchor="middle" fill="#fff">✓</text>
  
  <!-- Key metrics box at bottom -->
  <rect x="50" y="1360" width="800" height="30" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="8"/>
  <text x="70" y="1382" font-size="12" fill="#2c3e50" font-weight="bold">
    ⏱️ Total Cycle Time: 4-5 hours | 📊 Productivity: 150-200 tonnes/day | 🎯 Safety: Zero ventilation re-entry delays
  </text>
</svg>