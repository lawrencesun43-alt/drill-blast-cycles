<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 520" width="1500" height="520">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a085;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138d75;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d35400;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ba4a00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="750" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Variant 3: Improved Drill and Blast Cycle
  </text>
  <text x="750" y="55" font-size="14" text-anchor="middle" fill="#555" font-style="italic">
    Out-of-Cycle Shotcrete (Automated) + Enhanced Ground Support
  </text>
  
  <!-- Background -->
  <rect x="15" y="75" width="1470" height="355" fill="#f9f9f9" stroke="#ddd" stroke-width="2" rx="10"/>
  
  <!-- Phase 1: Drilling (Automated) -->
  <g>
    <rect x="25" y="95" width="145" height="140" fill="url(#grad1)" stroke="#2980b9" stroke-width="2" rx="8"/>
    <!-- Automated drill rig icon -->
    <rect x="55" y="120" width="28" height="55" fill="#fff" stroke="#333" stroke-width="2" rx="2"/>
    <circle cx="69" cy="110" r="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <rect x="64" y="125" width="10" height="7" fill="#333"/>
    <polygon points="60,180 78,180 69,195" fill="#333"/>
    <!-- Automation indicator -->
    <circle cx="95" cy="125" r="6" fill="#00ff00" stroke="#333" stroke-width="1"/>
    <text x="98" y="155" font-size="8" fill="#333">AUTO</text>
    <text x="97" y="250" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">DRILLING</text>
    <text x="97" y="270" font-size="9" text-anchor="middle" fill="#333" font-weight="bold">Automated Rig</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 170 165 L 207 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Phase 2: Charging -->
  <g>
    <rect x="207" y="95" width="145" height="140" fill="url(#grad2)" stroke="#c0392b" stroke-width="2" rx="8"/>
    <!-- Charging truck icon -->
    <rect x="237" y="125" width="48" height="32" fill="#fff" stroke="#333" stroke-width="2" rx="2"/>
    <circle cx="251" cy="140" r="5" fill="#333"/>
    <circle cx="273" cy="140" r="5" fill="#333"/>
    <rect x="232" y="152" width="58" height="8" fill="#333"/>
    <polygon points="242,120 262,115 267,120" fill="#e74c3c"/>
    <text x="279" y="250" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">CHARGING</text>
    <text x="279" y="270" font-size="9" text-anchor="middle" fill="#333" font-weight="bold">Charging Truck</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 352 165 L 389 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Phase 3: Blasting -->
  <g>
    <rect x="389" y="95" width="145" height="140" fill="url(#grad3)" stroke="#d68910" stroke-width="2" rx="8"/>
    <!-- Blasting system icon -->
    <circle cx="420" cy="125" r="11" fill="#fff" stroke="#333" stroke-width="2"/>
    <circle cx="420" cy="125" r="6" fill="#f39c12"/>
    <circle cx="448" cy="135" r="9" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <circle cx="448" cy="135" r="5" fill="#f39c12"/>
    <path d="M 430 150 L 453 178" stroke="#fff" stroke-width="2"/>
    <path d="M 438 145 L 438 160" stroke="#fff" stroke-width="2"/>
    <rect x="410" y="162" width="48" height="11" fill="#333" rx="2"/>
    <text x="461" y="250" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">BLASTING</text>
    <text x="461" y="270" font-size="9" text-anchor="middle" fill="#333" font-weight="bold">Blasting System</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 534 165 L 571 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Phase 4: Ventilation -->
  <g>
    <rect x="571" y="95" width="145" height="140" fill="url(#grad4)" stroke="#8e44ad" stroke-width="2" rx="8"/>
    <!-- Ventilation fan icon -->
    <circle cx="643" cy="135" r="18" fill="#fff" stroke="#333" stroke-width="2"/>
    <circle cx="643" cy="135" r="12" fill="#9b59b6"/>
    <line x1="635" y1="135" x2="651" y2="135" stroke="#fff" stroke-width="2"/>
    <line x1="643" y1="127" x2="643" y2="143" stroke="#fff" stroke-width="2"/>
    <path d="M 620 160 L 643 188 L 666 160" fill="#333" opacity="0.3"/>
    <path d="M 620 173 L 643 195 L 666 173" fill="#333" opacity="0.2"/>
    <text x="643" y="250" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">VENTILATION</text>
    <text x="643" y="270" font-size="9" text-anchor="middle" fill="#333" font-weight="bold">Fan System</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 716 165 L 753 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Phase 5: Mucking -->
  <g>
    <rect x="753" y="95" width="145" height="140" fill="url(#grad5)" stroke="#229954" stroke-width="2" rx="8"/>
    <!-- Loader icon -->
    <rect x="783" y="120" width="52" height="38" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="793" cy="140" r="7" fill="#333"/>
    <circle cx="817" cy="140" r="7" fill="#333"/>
    <polygon points="783,125 803,115 823,125" fill="#27ae60"/>
    <path d="M 793 155 L 813 173" stroke="#333" stroke-width="2"/>
    <text x="825" y="250" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">MUCKING</text>
    <text x="825" y="270" font-size="9" text-anchor="middle" fill="#333" font-weight="bold">Electric Loader</text>
  </g>
  
  <!-- Arrow 5 -->
  <path d="M 898 165 L 935 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Phase 6: Out-of-Cycle Shotcrete (Automated) - HIGHLIGHTED -->
  <g>
    <rect x="935" y="90" width="155" height="150" fill="url(#grad6)" stroke="#138d75" stroke-width="3" rx="8"/>
    <!-- Glow effect for automated -->
    <rect x="935" y="90" width="155" height="150" fill="none" stroke="#00ff00" stroke-width="2" rx="8" opacity="0.5" stroke-dasharray="5,5"/>
    
    <!-- Automated shotcrete robot icon -->
    <rect x="958" y="118" width="48" height="42" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="968" cy="130" r="5" fill="#333"/>
    <circle cx="990" cy="130" r="5" fill="#333"/>
    <path d="M 968 145 L 990 165" stroke="#333" stroke-width="2"/>
    <path d="M 975 138 L 980 165" stroke="#333" stroke-width="2"/>
    <!-- Spray nozzle -->
    <circle cx="985" cy="160" r="4" fill="#16a085"/>
    <path d="M 975 168 L 985 180 L 995 168" fill="#16a085" opacity="0.6"/>
    <!-- Automation indicator -->
    <circle cx="1020" cy="120" r="7" fill="#00ff00" stroke="#333" stroke-width="1.5"/>
    <text x="1023" y="145" font-size="7" fill="#333" text-anchor="middle">AUTO</text>
    <text x="1012" y="250" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">OUT-OF-CYCLE</text>
    <text x="1012" y="270" font-size="9" text-anchor="middle" fill="#333" font-weight="bold">Shotcrete Robot</text>
  </g>
  
  <!-- Arrow 6 -->
  <path d="M 1090 165 L 1127 165" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Phase 7: Final Support -->
  <g>
    <rect x="1127" y="95" width="145" height="140" fill="url(#grad8)" stroke="#2c3e50" stroke-width="2" rx="8"/>
    <!-- Shotcrete pump icon -->
    <rect x="1157" y="120" width="52" height="40" fill="#fff" stroke="#333" stroke-width="2" rx="3"/>
    <circle cx="1172" cy="135" r="6" fill="#333"/>
    <circle cx="1197" cy="130" r="5" fill="#333"/>
    <path d="M 1187 140 L 1192 165" stroke="#333" stroke-width="2"/>
    <circle cx="1195" cy="168" r="4" fill="#333"/>
    <path d="M 1177 165 L 1182 180 M 1187 165 L 1192 180 M 1197 165 L 1202 180" stroke="#34495e" stroke-width="2"/>
    <text x="1199" y="250" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">SUPPORT</text>
    <text x="1199" y="270" font-size="9" text-anchor="middle" fill="#333" font-weight="bold">Final Shotcrete</text>
  </g>
  
  <!-- Key Innovation Box -->
  <rect x="25" y="300" width="1445" height="115" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="8"/>
  <text x="45" y="320" font-size="13" font-weight="bold" fill="#34495e">⚙️ KEY INNOVATIONS:</text>
  <text x="45" y="345" font-size="12" fill="#2c3e50">
    ✓ <tspan font-weight="bold">Out-of-Cycle Shotcrete:</tspan> Automated robotic application between cycles prevents face deterioration and improves safety
  </text>
  <text x="45" y="368" font-size="12" fill="#2c3e50">
    ✓ <tspan font-weight="bold">Full Automation:</tspan> Drill rig + shotcrete robot operate independently, reducing manual intervention and increasing precision
  </text>
  <text x="45" y="391" font-size="12" fill="#2c3e50">
    ✓ <tspan font-weight="bold">Enhanced Ground Control:</tspan> Continuous support cycle prevents rock mass relaxation | <tspan font-weight="bold">Optimized Cycle:</tspan> 6-8 phases with simultaneous automation improves productivity by ~25%
  </text>
</svg>